[env]
# util-linux (from Homebrew) provides libblkid, needed by libblkid-rs-sys.
PKG_CONFIG_PATH = "/opt/homebrew/opt/util-linux/lib/pkgconfig"
# Wrapper used by libkrun-devices' build.rs to compile init/init.c for the
# Linux guest. On macOS hosts the wrapper invokes Homebrew clang against a
# bootstrapped Debian arm64 sysroot; on Linux hosts it just execs `cc`. This
# entry is unconditional because Cargo's [env] is not target-conditional —
# host-awareness lives in the script itself.
CC_LINUX = { value = "cc_linux", relative = true }
