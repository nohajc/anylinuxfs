name: Linux AArch64

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  anylinuxfs:
    name: anylinuxfs native Linux AArch64
    runs-on: debian-linux-arm64

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Verify host runner prerequisites
        run: |
          command -v bash
          command -v git
          command -v node
          command -v rustup
          command -v cargo
          command -v sudo

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust targets
        run: |
          rustup target add aarch64-unknown-linux-musl
          rustup toolchain install nightly-2026-01-25 --profile minimal --component rust-src

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bats \
            ca-certificates \
            clang \
            curl \
            expect \
            git \
            iproute2 \
            libblkid-dev \
            libclang-dev \
            libtirpc-dev \
            lld \
            nfs-common \
            pkg-config \
            qemu-utils \
            util-linux \
            xz-utils

      - name: Download runtime dependencies
        run: ./download-dependencies.sh

      - name: Build anylinuxfs for Linux AArch64
        run: ./build-app.sh

      - name: Run Rust unit tests
        run: ./run-rust-tests.sh

#      - name: Configure containers registries
#        run: |
#          mkdir -p "$HOME/.config/containers"
#          printf '%s\n' 'unqualified-search-registries = ["docker.io"]' > "$HOME/.config/containers/registries.conf"

      - name: Initialize Linux rootfs
        run: ./bin/anylinuxfs init

      - name: Run integration tests
        run: sudo --preserve-env=HOME ./tests/run-tests.sh --tap
