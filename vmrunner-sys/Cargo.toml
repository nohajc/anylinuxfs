[package]
name = "vmrunner-sys"
version = "0.16.1"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
libkrun = { git = "https://github.com/containers/libkrun", tag = "v1.18.0" }
libc = "0.2"

[features]
default = ["freebsd"]
freebsd = []

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
